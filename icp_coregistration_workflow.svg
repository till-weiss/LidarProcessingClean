<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080">
  <defs>
    <style>
      .title { font: 700 34px 'Arial', sans-serif; fill: #1f2a35; }
      .subtitle { font: 500 17px 'Arial', sans-serif; fill: #5b6b7a; }
      .step { font: 600 19px 'Arial', sans-serif; fill: #1f2a35; }
      .detail { font: 400 15px 'Arial', sans-serif; fill: #4f6172; }
      .loopTitle { font: 700 17px 'Arial', sans-serif; fill: #33556d; }
    </style>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6b8194"/>
    </marker>
  </defs>

  <rect width="1500" height="1080" fill="#ffffff"/>
  <text x="750" y="58" text-anchor="middle" class="title">ICP Co-registration Workflow</text>
  <text x="750" y="88" text-anchor="middle" class="subtitle">Detailed strip registration method for geometric alignment of ALS point clouds</text>

  <!-- Main flow nodes -->
  <rect x="140" y="145" width="280" height="70" rx="14" fill="#dbe8f3" stroke="#9db6c9"/>
  <text x="280" y="188" text-anchor="middle" class="step">1. Input ALS Strips</text>

  <rect x="470" y="145" width="280" height="70" rx="14" fill="#d6e5f1" stroke="#97b1c7"/>
  <text x="610" y="188" text-anchor="middle" class="step">2. Select Reference Strip</text>

  <rect x="800" y="145" width="280" height="70" rx="14" fill="#d2e3ef" stroke="#90abc2"/>
  <text x="940" y="188" text-anchor="middle" class="step">3. Extract Overlapping Areas</text>

  <rect x="1130" y="145" width="250" height="70" rx="14" fill="#dbe8f3" stroke="#9db6c9"/>
  <text x="1255" y="188" text-anchor="middle" class="step">4. Stable Ground Filtering</text>

  <rect x="560" y="270" width="380" height="70" rx="14" fill="#d3e4f0" stroke="#91acc3"/>
  <text x="750" y="313" text-anchor="middle" class="step">5. Point Subsampling</text>

  <rect x="560" y="380" width="380" height="70" rx="14" fill="#d8e7f2" stroke="#9ab4c8"/>
  <text x="750" y="423" text-anchor="middle" class="step">6. Initial Alignment</text>

  <!-- ICP loop panel -->
  <rect x="250" y="490" width="1000" height="350" rx="24" fill="#eef4f8" stroke="#9db4c6" stroke-dasharray="8 6"/>
  <text x="290" y="525" class="loopTitle">7. Iterative Closest Point (ICP) Loop</text>

  <rect x="310" y="560" width="210" height="70" rx="12" fill="#c9dceb" stroke="#88a6be"/>
  <text x="415" y="603" text-anchor="middle" class="step">Find Correspondences</text>

  <rect x="545" y="560" width="210" height="70" rx="12" fill="#c5d9e9" stroke="#86a3bc"/>
  <text x="650" y="603" text-anchor="middle" class="step">Estimate</text>
  <text x="650" y="622" text-anchor="middle" class="detail">Transformation</text>

  <rect x="780" y="560" width="210" height="70" rx="12" fill="#c9dceb" stroke="#88a6be"/>
  <text x="885" y="603" text-anchor="middle" class="step">Apply Transformation</text>

  <rect x="1015" y="560" width="210" height="70" rx="12" fill="#c5d9e9" stroke="#86a3bc"/>
  <text x="1120" y="603" text-anchor="middle" class="step">Compute</text>
  <text x="1120" y="622" text-anchor="middle" class="detail">Residual Error</text>

  <rect x="590" y="700" width="320" height="80" rx="14" fill="#d1e3f0" stroke="#90abc2"/>
  <text x="750" y="744" text-anchor="middle" class="step">8. Convergence Check</text>

  <rect x="370" y="900" width="360" height="75" rx="14" fill="#d8e7f2" stroke="#9ab4c8"/>
  <text x="550" y="944" text-anchor="middle" class="step">9. Aligned Point Clouds</text>

  <rect x="780" y="900" width="360" height="75" rx="14" fill="#d2e3ef" stroke="#90abc2"/>
  <text x="960" y="944" text-anchor="middle" class="step">10. Merge Registered Strips</text>

  <!-- Arrows main -->
  <path d="M420 180 L470 180" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M750 180 L800 180" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M1080 180 L1130 180" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M1255 215 L1255 255 L940 255 L940 305" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M750 340 L750 380" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M750 450 L750 490" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>

  <!-- ICP inner flow -->
  <path d="M520 595 L545 595" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M755 595 L780 595" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M990 595 L1015 595" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M1120 630 L1120 680 L910 680" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M590 740 L520 740 L520 630 L415 630" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>

  <!-- convergence exits -->
  <path d="M750 780 L750 860 L550 860 L550 900" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <path d="M730 740 L670 740" stroke="#5f7b92" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <text x="600" y="728" class="detail">not converged</text>
  <path d="M910 740 L980 740 L980 860 L960 860 L960 900" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <text x="920" y="728" class="detail">converged</text>

  <path d="M730 937 L780 937" stroke="#6b8194" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
</svg>
