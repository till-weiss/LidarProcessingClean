<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1460" viewBox="0 0 900 1460">
  <defs>
    <style>
      .title { font: 700 34px 'Arial', sans-serif; fill: #1f2a35; }
      .subtitle { font: 500 18px 'Arial', sans-serif; fill: #5c6d7d; }
      .groupLabel { font: 700 16px 'Arial', sans-serif; fill: #355064; }
      .step { font: 600 18px 'Arial', sans-serif; fill: #1f2a35; }
      .small { font: 500 14px 'Arial', sans-serif; fill: #52687b; }
      .decision { font: 600 15px 'Arial', sans-serif; fill: #223546; }
      .yn { font: 500 13px 'Arial', sans-serif; fill: #4e677b; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#6e8498"/>
    </marker>
  </defs>

  <rect width="900" height="1400" fill="#ffffff"/>
  <text x="450" y="58" text-anchor="middle" class="title">ICP Co-registration Workflow</text>
  <text x="450" y="88" text-anchor="middle" class="subtitle">Cluster-based iterative strip alignment for ALS co-registration</text>

  <!-- Preprocessing block -->
  <rect x="80" y="120" width="740" height="330" rx="20" fill="#eef4f8" stroke="#d2e0ea"/>
  <text x="105" y="148" class="groupLabel">Preprocessing for registration</text>

  <rect x="180" y="170" width="540" height="56" rx="12" fill="#dbe8f3" stroke="#9db6c9"/>
  <text x="450" y="205" text-anchor="middle" class="step">1. Input ALS Strips</text>

  <rect x="180" y="245" width="540" height="56" rx="12" fill="#d5e4f1" stroke="#96b1c7"/>
  <text x="450" y="280" text-anchor="middle" class="step">2. Sort Strips Chronologically</text>

  <rect x="180" y="320" width="540" height="56" rx="12" fill="#d3e3ef" stroke="#91abc2"/>
  <text x="450" y="355" text-anchor="middle" class="step">3. Build ICP-ready Strips</text>
  <text x="450" y="372" text-anchor="middle" class="small">stable-ground filtering · voxel subsampling</text>

  <rect x="180" y="395" width="540" height="40" rx="12" fill="#dbe8f3" stroke="#9db6c9"/>
  <text x="450" y="421" text-anchor="middle" class="small">Output: ICP-ready strip set + unresolved strip pool</text>

  <path d="M450 226 L450 245" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 301 L450 320" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 376 L450 395" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <!-- ICP core block -->
  <rect x="70" y="470" width="760" height="760" rx="24" fill="#f3f7fb" stroke="#9fb7ca" stroke-dasharray="8 6"/>
  <text x="95" y="500" class="groupLabel">Core ICP iterative registration (cluster-based)</text>

  <rect x="170" y="525" width="560" height="52" rx="12" fill="#d4e5f1" stroke="#95b1c7"/>
  <text x="450" y="558" text-anchor="middle" class="step">4. Select Initial Seed Strip</text>

  <rect x="170" y="595" width="560" height="52" rx="12" fill="#d0e2ef" stroke="#8faac2"/>
  <text x="450" y="628" text-anchor="middle" class="step">5. Create Cluster from Seed</text>

  <rect x="170" y="665" width="560" height="52" rx="12" fill="#d4e5f1" stroke="#95b1c7"/>
  <text x="450" y="698" text-anchor="middle" class="step">6. Search Overlapping Candidate Strips</text>

  <!-- decision 1 -->
  <polygon points="450,737 520,792 450,847 380,792" fill="#e6eef5" stroke="#9bb2c4"/>
  <text x="450" y="788" text-anchor="middle" class="decision">Sufficient overlap?</text>

  <rect x="170" y="870" width="560" height="52" rx="12" fill="#cfe1ee" stroke="#8da8c0"/>
  <text x="450" y="903" text-anchor="middle" class="step">7. Select Best Reference Strip</text>

  <rect x="170" y="940" width="560" height="52" rx="12" fill="#d4e5f1" stroke="#95b1c7"/>
  <text x="450" y="973" text-anchor="middle" class="step">8. Crop Overlap Regions</text>

  <rect x="170" y="1010" width="560" height="56" rx="12" fill="#c9dceb" stroke="#88a6be"/>
  <text x="450" y="1041" text-anchor="middle" class="step">9. Run Point-to-Plane ICP</text>
  <text x="450" y="1058" text-anchor="middle" class="small">find correspondences · estimate / apply transform · compute residuals</text>

  <!-- decision 2 -->
  <polygon points="450,1087 520,1142 450,1197 380,1142" fill="#e3edf5" stroke="#98b0c3"/>
  <text x="450" y="1138" text-anchor="middle" class="decision">Valid ICP result?</text>

  <!-- decision 3 -->
  <polygon points="450,1212 520,1267 450,1322 380,1267" fill="#e6eef5" stroke="#9bb2c4"/>
  <text x="450" y="1263" text-anchor="middle" class="decision">Quality threshold passed?</text>

  <!-- flow arrows in block -->
  <path d="M450 577 L450 595" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 647 L450 665" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 717 L450 737" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 847 L450 870" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 922 L450 940" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 992 L450 1010" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 1066 L450 1087" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M450 1197 L450 1212" stroke="#6e8498" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>

  <!-- overlap fail loop: postpone unresolved -->
  <path d="M380 792 L130 792 L130 698 L170 698" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="140" y="780" class="yn">No → postpone strip (unresolved)</text>

  <!-- ICP invalid loop -->
  <path d="M380 1142 L110 1142 L110 698 L170 698" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="120" y="1129" class="yn">No → retry with next candidate</text>

  <!-- quality fail loop -->
  <path d="M380 1267 L90 1267 L90 698 L170 698" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="100" y="1254" class="yn">No → keep unresolved, continue search</text>

  <!-- accepted path -->
  <rect x="560" y="1240" width="250" height="54" rx="12" fill="#d0e2ef" stroke="#8faac2"/>
  <text x="685" y="1273" text-anchor="middle" class="step" style="font-size:16px">10. Apply Transformation</text>

  <rect x="560" y="1304" width="250" height="54" rx="12" fill="#d5e4f1" stroke="#96b1c7"/>
  <text x="685" y="1337" text-anchor="middle" class="step" style="font-size:16px">11. Add Aligned Strip to Cluster</text>

  <path d="M520 1267 L560 1267" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="525" y="1254" class="yn">Yes</text>
  <path d="M685 1294 L685 1304" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 1331 L540 1331 L540 698 L730 698" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="545" y="1318" class="yn">continue iterative registration</text>

  <text x="460" y="860" class="yn">Yes</text>
  <text x="460" y="1128" class="yn">Yes</text>

  <!-- post-loop outputs and unresolved management -->
  <polygon points="450,1245 520,1300 450,1355 380,1300" fill="#e3edf5" stroke="#98b0c3"/>
  <text x="450" y="1296" text-anchor="middle" class="decision">Unresolved strips remaining?</text>

  <rect x="110" y="1268" width="250" height="64" rx="12" fill="#dbe8f3" stroke="#9db6c9"/>
  <text x="235" y="1296" text-anchor="middle" class="step" style="font-size:16px">12. Create New Cluster</text>
  <text x="235" y="1315" text-anchor="middle" class="small">from next seed strip</text>

  <rect x="540" y="1368" width="300" height="64" rx="12" fill="#d0e0ed" stroke="#8ea8bd"/>
  <text x="690" y="1396" text-anchor="middle" class="step" style="font-size:16px">13. Merge Aligned Clusters</text>
  <text x="690" y="1415" text-anchor="middle" class="small">output accepted aligned strips</text>

  <path d="M450 435 L450 470" stroke="#6e8498" stroke-width="2.8" fill="none" marker-end="url(#arrow)"/>

  <path d="M450 1322 L450 1245" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M380 1300 L360 1300" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="330" y="1288" class="yn">Yes</text>
  <path d="M235 1268 L235 558 L170 558" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

  <path d="M520 1300 L540 1300 L540 1368" stroke="#6e8498" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text x="525" y="1288" class="yn">No</text>
</svg>
